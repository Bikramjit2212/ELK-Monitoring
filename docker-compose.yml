services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.3
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xm512m -Xm512m 
    ports:
    - "9200:9200"
    networks:
      - elk
  
  logstash:
    image: docker.elastic.co/logstash/logstash:9.2.3
    container_name: logstash
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
    - "5044:5044"
    depends_on:
      - elasticsearch
    networks:
      - elk

  kibana:
    image: docker.elastic.co/kibana/kibana:9.2.3
    container_name: kibana
    ports:
    - "5601:5601"
    networks:
      - elk
    depends_on:
      - elasticsearch

networks:
  elk: